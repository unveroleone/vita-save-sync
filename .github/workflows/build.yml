name: Build VPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Cache VitaSDK
        id: cache-vitasdk
        uses: actions/cache@v4
        with:
          path: /usr/local/vitasdk
          key: vitasdk-softfp-linux-v2.228

      - name: Install VitaSDK
        if: steps.cache-vitasdk.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/vitasdk/buildscripts/releases/download/softfp-linux-v2.228/vitasdk-x86_64-linux-gnu-2022-08-14_14-50-39.tar.bz2 -O vitasdk.tar.bz2
          sudo tar xf vitasdk.tar.bz2 -C /usr/local
          rm vitasdk.tar.bz2

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: rust-nightly-2025-06-01-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-nightly-2025-06-01-

      - name: Install Rust and cargo-vita
        run: |
          rustup toolchain install nightly-2025-06-01 --component rust-src
          cargo install cargo-vita --locked

      - name: Build VPK
        run: cargo vita build vpk --release
        env:
          VITASDK: /usr/local/vitasdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vita-save-cloud
          path: target/armv7-sony-vita-newlibeabihf/release/vita-save-cloud.vpk
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/armv7-sony-vita-newlibeabihf/release/vita-save-cloud.vpk
          name: Save Sync ${{ github.ref_name }}
