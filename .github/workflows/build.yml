name: Build VPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install native build tools
        run: apk add --no-cache gcc musl-dev perl

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            /root/.rustup
            /root/.cargo/registry
            /root/.cargo/git
            /root/.cargo/bin
          key: rust-nightly-2025-06-01-${{ hashFiles('Cargo.lock') }}
          restore-keys: rust-nightly-2025-06-01-

      - name: Install Rust and cargo-vita
        env:
          HOME: /root
          CARGO_HOME: /root/.cargo
          RUSTUP_HOME: /root/.rustup
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain none --no-modify-path
          /root/.cargo/bin/rustup toolchain install nightly-2025-06-01 --component rust-src
          /root/.cargo/bin/cargo install cargo-vita --locked
          echo "/root/.cargo/bin" >> "$GITHUB_PATH"
          echo "CARGO_HOME=/root/.cargo" >> "$GITHUB_ENV"
          echo "RUSTUP_HOME=/root/.rustup" >> "$GITHUB_ENV"
          echo "HOME=/root" >> "$GITHUB_ENV"

      - name: Build VPK
        run: cargo vita build vpk --release
        env:
          VITASDK: /usr/local/vitasdk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vita-save-cloud
          path: target/armv7-sony-vita-newlibeabihf/release/vita-save-cloud.vpk
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/armv7-sony-vita-newlibeabihf/release/vita-save-cloud.vpk
          name: Save Sync ${{ github.ref_name }}
